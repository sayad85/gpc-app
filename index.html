function migrateOld(o){
  if(!o)return null;
  if(o.chantiers)o.chantiers=o.chantiers.map(c=>({avanceDZD:0,avanceEUR:0,notes:"",...c}));
  if(o.depenses)o.depenses=o.depenses.map(d=>({justificatif:null,...d}));
  if(o.parametres){
    if(!o.parametres.profil)o.parametres.profil={nom:"",prenom:"",matricule:"",entreprise:""};
    if(!o.parametres.categories)o.parametres.categories=[...DEFAULT_CATS];
    if(!o.parametres.alerteJours)o.parametres.alerteJours=30;
  }
  if(!o.sync)o.sync={serverIP:"",lastSync:null};
  if(!o.deletedIds)o.deletedIds=[];
  return o;
}
let DATA=(()=>{
  try{
    const v3=JSON.parse(localStorage.getItem(STORAGE_KEY));if(v3)return v3;
    const v2=JSON.parse(localStorage.getItem(STORAGE_KEY_OLD));if(v2){const m=migrateOld(v2);if(m)return m;}
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
})();

function save(){
  try{
    const dataToStore={
      ...DATA,
      depenses:DATA.depenses.map(d=>({...d,justificatif:null}))
    };
    localStorage.setItem(STORAGE_KEY,JSON.stringify(dataToStore));
  }
  catch(e){showToast("⚠️ Stockage plein");return;}
  showToast("✓ Sauvegardé");
}

  if(!dateStr)return 9999;
  return Math.floor((Date.now()-new Date(dateStr).getTime())/(1000*86400));

function svgBarChart(items, color="#f59e0b", height=80){
  // items = [{label, value}]
  if(!items.length)return "";
  const W=Math.max(items.length*42, 300);
  const maxV=Math.max(...items.map(i=>i.value),1);
  const barW=28, gap=14, padL=8, padB=28, padT=16;
  const chartH=height-padB-padT;
  const bars=items.map((item,i)=>{
    const x=padL+i*(barW+gap);
    const bh=Math.round((item.value/maxV)*chartH);
    const y=padT+chartH-bh;
    const valLabel=item.value>0?(item.value>=1000?Math.round(item.value/1000)+"k":item.value):"";
    return `
      <rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="4" fill="${color}" opacity="0.85"/>
      ${item.value>0?`<text x="${x+barW/2}" y="${y-3}" text-anchor="middle" class="bar-value">${valLabel}</text>`:""}
      <text x="${x+barW/2}" y="${height-6}" text-anchor="middle" class="bar-label">${item.label}</text>`;
  }).join("");
  return `<div class="chart-wrap"><svg width="${W}" height="${height}" style="display:block">${bars}</svg></div>`;
}

function getMonthlyData(depenses, devise){
  const months={};
  const now=new Date();
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const label=d.toLocaleDateString("fr-FR",{month:"short"}).replace(".","");
    months[key]={label,value:0};
  }
  depenses.filter(d=>d.devise===devise).forEach(d=>{
    const key=d.date?.slice(0,7);
    if(months[key])months[key].value+=d.montant;
  });
  return Object.values(months);
}

function getYearlyJours(){
  const byYear={};
  DATA.chantiers.forEach(c=>{
    if(!c.dateDebut)return;
    const y=c.dateDebut.slice(0,4);
    byYear[y]=(byYear[y]||0)+(c.jours||0);
  });
  const currentYear=new Date().getFullYear();
  const years=[];
  for(let y=currentYear-3;y<=currentYear;y++){
    years.push({label:String(y),value:byYear[String(y)]||0});
  }
  return years;
}

// RENDER ENGINE

let currentTab="dashboard",modalStack=[],pageAbortController=null;

function render(){
  document.getElementById("content").innerHTML=getPage(currentTab);
  document.getElementById("nav").innerHTML=renderNav();
  attachPageEvents();
}
function renderNav(){
  const tabs=[
    {id:"dashboard",icon:"home",label:"Accueil"},
    {id:"chantiers",icon:"site",label:"Chantiers"},
    {id:"depenses",icon:"exp",label:"Dépenses"},
    {id:"stats",icon:"chart",label:"Stats"},
    {id:"parametres",icon:"cog",label:"Config"},
  ];
  return tabs.map(t=>`<button class="nav-btn ${currentTab===t.id?"active":""}" data-tab="${t.id}">${I(t.icon,22)}<span>${t.label}</span></button>`).join("");
}
function switchTab(tab){currentTab=tab;render();}
function getPage(tab){
  if(tab==="dashboard")return pageDashboard();
  if(tab==="chantiers")return pageChantiers();
  if(tab==="depenses")return pageDepenses();
  if(tab==="stats")return pageStats();
  if(tab==="parametres")return pageParametres();
  return "";
}

// ═══════════════════════════════════════════════════════
// ALERTES
// ═══════════════════════════════════════════════════════
function getAlertes(){
  const seuil=DATA.parametres.alerteJours||30;
  const alerts=[];
  DATA.depenses.filter(d=>d.status==="Non Payé").forEach(d=>{
    const age=daysSince(d.date);
    if(age>=seuil){
      const ch=DATA.chantiers.find(c=>c.id===d.chantierId);
      alerts.push({dep:d,ch,age});
    }
  });
  return alerts.sort((a,b)=>b.age-a.age);
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function pageDashboard(){
  const ch=DATA.chantiers,deps=DATA.depenses;
  const totalJours=ch.reduce((s,c)=>s+(c.jours||0),0);
  const totalPrime=ch.reduce((s,c)=>s+calcPrime(c),0);
  const primePayee=ch.filter(c=>c.status==="Payé").reduce((s,c)=>s+calcPrime(c),0);
  const depsNP=deps.filter(d=>d.status==="Non Payé");
  const totalDZD_NP=depsNP.filter(d=>d.devise==="DZD").reduce((s,d)=>s+d.montant,0);
  const totalEUR_NP=depsNP.filter(d=>d.devise==="EUR").reduce((s,d)=>s+d.montant,0);
  const avDZD=ch.reduce((s,c)=>s+(c.avanceDZD||0),0);
  const avEUR=ch.reduce((s,c)=>s+(c.avanceEUR||0),0);
  const netDZD=Math.max(0,totalDZD_NP-avDZD),netEUR=Math.max(0,totalEUR_NP-avEUR);
  const alerts=getAlertes();

  return `<div class="space20">
    <div><h1>Tableau de bord</h1><p class="page-sub">${ch.length} chantier${ch.length!==1?"s":""} · ${totalJours} jours</p></div>

    ${alerts.length>0?`
    <div>
      <div class="section-label" style="color:var(--red)">🔔 Alertes — Non remboursé depuis +${DATA.parametres.alerteJours||30}j</div>
      ${alerts.slice(0,3).map(a=>`
      <div class="alert-card">
        <div class="alert-title">${a.dep.description||"—"} · ${fmt(a.dep.montant)} ${a.dep.devise}</div>
        <div class="alert-body">${a.ch?.nom||"?"} · <strong style="color:#fca5a5">${a.age} jours</strong> sans remboursement</div>
      </div>`).join("")}
      ${alerts.length>3?`<div style="font-size:11px;color:var(--text3);text-align:center">+${alerts.length-3} autres alertes</div>`:""}
    </div>`:""}

    <div class="grid2">
      <div class="card"><div class="stat-label">Total jours</div><div class="stat-value c-blue">${fmt(totalJours)}</div></div>
      <div class="card"><div class="stat-label">Primes totales</div><div class="stat-value c-amber">${fmtEUR(totalPrime)}</div></div>
      <div class="card"><div class="stat-label">Primes payées</div><div class="stat-value c-green">${fmtEUR(primePayee)}</div></div>
      <div class="card"><div class="stat-label">Non payées</div><div class="stat-value c-red">${fmtEUR(totalPrime-primePayee)}</div></div>
    </div>

    <div class="card">
      <div class="section-label">Dépenses non remboursées</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="card" style="padding:12px;border-left:3px solid #60a5fa">
          <div class="stat-label">En DZD</div>
          <div style="font-family:var(--font-title);font-weight:800;font-size:15px;color:#60a5fa">${fmtDZD(totalDZD_NP)}</div>
          ${avDZD>0?`<div style="font-size:11px;color:var(--green);margin-top:3px">Avances: -${fmtDZD(avDZD)}</div><div style="font-weight:700;font-size:12px;color:var(--amber)">Net: ${fmtDZD(netDZD)}</div>`:""}
        </div>
        <div class="card" style="padding:12px;border-left:3px solid var(--amber)">
          <div class="stat-label">En EUR</div>
          <div style="font-family:var(--font-title);font-weight:800;font-size:15px;color:var(--amber)">${fmtEUR(totalEUR_NP)}</div>
          ${avEUR>0?`<div style="font-size:11px;color:var(--green);margin-top:3px">Avances: -${fmtEUR(avEUR)}</div><div style="font-weight:700;font-size:12px;color:var(--amber)">Net: ${fmtEUR(netEUR)}</div>`:""}
        </div>
      </div>
    </div>

    ${ch.filter(c=>c.status!=="Payé").length>0?`
    <div class="card">
      <div class="section-label">Chantiers en attente</div>
      <div class="space8">
        ${ch.filter(c=>c.status!=="Payé").map(c=>`
        <div class="row-between" style="padding:8px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-size:13px;font-weight:600">${c.nom}</div><div style="font-size:11px;color:var(--text3)">${c.jours} j · ${c.type}</div></div>
          <div style="font-size:13px;font-weight:700;color:var(--amber)">${fmtEUR(calcPrime(c))}</div>
        </div>`).join("")}
      </div>
    </div>`:""}
  </div>`;
}

function pageStats(){
  const dzdMonthly=getMonthlyData(DATA.depenses,"DZD");
  const eurMonthly=getMonthlyData(DATA.depenses,"EUR");
  const yearlyJours=getYearlyJours();
  const totalJoursAn=DATA.chantiers.filter(c=>{
    if(!c.dateDebut)return false;
    return c.dateDebut.startsWith(String(new Date().getFullYear()));
  }).reduce((s,c)=>s+(c.jours||0),0);
  const byCatDZD={},byCatEUR={};
  DATA.depenses.forEach(d=>{
    if(d.devise==="DZD")byCatDZD[d.categorie]=(byCatDZD[d.categorie]||0)+d.montant;
    if(d.devise==="EUR")byCatEUR[d.categorie]=(byCatEUR[d.categorie]||0)+d.montant;
  });
  const maxDZD=Math.max(...Object.values(byCatDZD),1);
  const maxEUR=Math.max(...Object.values(byCatEUR),1);

  return `<div class="space16">
    <div><h1>Statistiques</h1><p class="page-sub">Graphiques & analyses</p></div>

    <div class="card">
      <div class="section-label">📅 Jours travaillés par année</div>
      <div style="margin-bottom:8px;font-family:var(--font-title);font-weight:800;font-size:22px;color:var(--blue)">${totalJoursAn} <span style="font-size:13px;font-weight:400;color:var(--text3)">jours en ${new Date().getFullYear()}</span></div>
      ${svgBarChart(yearlyJours,"#60a5fa",90)}
    </div>

    <div class="card">
      <div class="section-label">📊 Dépenses mensuelles — DZD (12 mois)</div>
      ${svgBarChart(dzdMonthly,"#60a5fa",90)}
    </div>

    ${eurMonthly.some(m=>m.value>0)?`
    <div class="card">
      <div class="section-label">📊 Dépenses mensuelles — EUR (12 mois)</div>
      ${svgBarChart(eurMonthly,"#f59e0b",90)}
    </div>`:""}

    ${Object.keys(byCatDZD).length>0?`
    <div class="card">
      <div class="section-label">Par catégorie — DZD</div>
      <div class="space8">
        ${Object.entries(byCatDZD).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`
        <div>
          <div class="row-between" style="margin-bottom:4px"><span style="font-size:12px;color:var(--text2)">${cat}</span><span style="font-size:12px;font-weight:600">${fmtDZD(val)}</span></div>
          <div class="progress-bg"><div class="progress-fill" style="width:${Math.round(val/maxDZD*100)}%;background:#60a5fa"></div></div>
        </div>`).join("")}
      </div>
    </div>`:""}

    ${Object.keys(byCatEUR).length>0?`
    <div class="card">
      <div class="section-label">Par catégorie — EUR</div>
      <div class="space8">
        ${Object.entries(byCatEUR).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`
        <div>
          <div class="row-between" style="margin-bottom:4px"><span style="font-size:12px;color:var(--text2)">${cat}</span><span style="font-size:12px;font-weight:600">${fmtEUR(val)}</span></div>
          <div class="progress-bg"><div class="progress-fill" style="width:${Math.round(val/maxEUR*100)}%"></div></div>
        </div>`).join("")}
      </div>
    </div>`:""}

    ${getAlertes().length>0?`
    <div class="card" style="border-color:rgba(239,68,68,.3)">
      <div class="section-label" style="color:var(--red)">🔔 Toutes les alertes (${getAlertes().length})</div>
      <div class="space8">
        ${getAlertes().map(a=>`
        <div class="alert-card" style="margin-bottom:0">
          <div class="alert-title">${a.dep.description||"—"} — ${fmt(a.dep.montant)} ${a.dep.devise}</div>
          <div class="alert-body">${a.ch?.nom||"?"} · <strong style="color:#fca5a5">${a.age} jours</strong></div>
        </div>`).join("")}
      </div>
    </div>`:""}
  </div>`;
}

let depFilter="all",depSort="date-desc",depSearch="";

function pageDepenses(){
  let deps=[...DATA.depenses];
  // Filtre
  if(depFilter==="nonpaye")deps=deps.filter(d=>d.status==="Non Payé");
  else if(depFilter==="paye")deps=deps.filter(d=>d.status==="Payé");
  else if(depFilter==="dzd")deps=deps.filter(d=>d.devise==="DZD");
  else if(depFilter==="eur")deps=deps.filter(d=>d.devise==="EUR");
  // Recherche
  if(depSearch.trim()){
    const q=depSearch.toLowerCase();
    deps=deps.filter(d=>{
      const ch=DATA.chantiers.find(c=>c.id===d.chantierId);
      return (d.description||"").toLowerCase().includes(q)||(ch?.nom||"").toLowerCase().includes(q)||(d.categorie||"").toLowerCase().includes(q);
    });
  }
  // Tri
  deps.sort((a,b)=>{
    if(depSort==="date-desc")return (b.date||"").localeCompare(a.date||"");
    if(depSort==="date-asc")return (a.date||"").localeCompare(b.date||"");
    if(depSort==="montant-desc")return b.montant-a.montant;
    if(depSort==="montant-asc")return a.montant-b.montant;
    return 0;
  });
  const totalDZD=deps.filter(d=>d.devise==="DZD").reduce((s,d)=>s+d.montant,0);
  const totalEUR=deps.filter(d=>d.devise==="EUR").reduce((s,d)=>s+d.montant,0);

  return `<div class="space16">
    <div><h1>Dépenses</h1><p class="page-sub">${DATA.depenses.length} entrée${DATA.depenses.length!==1?"s":""}</p></div>
    <input class="search-bar" id="dep-search" placeholder="🔍 Rechercher description, chantier..." value="${depSearch}" data-action="dep-search-input"/>
    <div class="filter-tabs">
      <button class="filter-tab ${depFilter==="all"?"active":""}" data-filter="all">Toutes</button>
      <button class="filter-tab ${depFilter==="dzd"?"active":""}" data-filter="dzd">DZD</button>
      <button class="filter-tab ${depFilter==="eur"?"active":""}" data-filter="eur">EUR</button>
      <button class="filter-tab ${depFilter==="nonpaye"?"active":""}" data-filter="nonpaye">Non payées</button>
      <button class="filter-tab ${depFilter==="paye"?"active":""}" data-filter="paye">Payées</button>
    </div>
    <div class="row-between" style="gap:8px">
      <div style="font-size:12px;color:var(--text3)">${deps.length} résultat${deps.length!==1?"s":""}</div>
      <select id="dep-sort" data-action="dep-sort-change" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--text2);outline:none;font-family:var(--font-body)">
        <option value="date-desc" ${depSort==="date-desc"?"selected":""}>Date ↓</option>
        <option value="date-asc" ${depSort==="date-asc"?"selected":""}>Date ↑</option>
        <option value="montant-desc" ${depSort==="montant-desc"?"selected":""}>Montant ↓</option>
        <option value="montant-asc" ${depSort==="montant-asc"?"selected":""}>Montant ↑</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="card" style="padding:12px;border-left:3px solid #60a5fa">
        <div class="stat-label">Total DZD</div>
        <div style="font-family:var(--font-title);font-weight:800;font-size:15px;color:#60a5fa">${fmtDZD(totalDZD)}</div>
      </div>
      <div class="card" style="padding:12px;border-left:3px solid var(--amber)">
        <div class="stat-label">Total EUR</div>
        <div style="font-family:var(--font-title);font-weight:800;font-size:15px;color:var(--amber)">${fmtEUR(totalEUR)}</div>
      </div>
    </div>
    ${deps.length===0?`<div class="empty"><div class="empty-icon">💰</div><p>${depSearch?"Aucun résultat":"Aucune dépense"}</p></div>`:`
    <div class="space8">${deps.map(d=>{
      const ch=DATA.chantiers.find(c=>c.id===d.chantierId);
      return `<div class="card">
        <div class="row-between" style="margin-bottom:8px">
          <div style="flex:1;min-width:0;margin-right:8px">

          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="font-size:14px;font-weight:700;color:${d.devise==="EUR"?"var(--amber)":"#60a5fa"}">${fmt(d.montant)} ${d.devise}</div>
          </div>

function openModal(title,content,onClose){
  const div=document.createElement("div");
  div.className="modal";
  div.innerHTML=`<div class="modal-header"><button class="btn btn-ghost btn-icon" data-action="modal-close">${I("back")}</button><h2 style="font-size:16px">${title}</h2></div><div class="modal-body">${content}</div>`;
  document.getElementById("app").appendChild(div);
  modalStack.push({div,onClose});
  attachModalEvents(div);
}
function closeModal(){
  if(!modalStack.length)return;
  const{div,onClose}=modalStack.pop();
  div.remove();if(onClose)onClose();
}
function closeAllModals(){
  while(modalStack.length){const{div}=modalStack.pop();div.remove();}
  render();
}

function downloadFile(name,type,content){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=name;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportCSV(){
  const rows=[["Chantier","Type","Localisation","Date","Catégorie","Description","Montant","Devise","Statut","Avance DZD","Avance EUR"],
    ...DATA.depenses.map(d=>{const ch=DATA.chantiers.find(c=>c.id===d.chantierId);return[ch?.nom||"?",ch?.type||"",ch?.localisation||"",d.date,d.categorie,d.description,d.montant,d.devise,d.status,ch?.avanceDZD||0,ch?.avanceEUR||0];})];
  downloadFile("gpc_depenses.csv","text/csv;charset=utf-8","\uFEFF"+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n"));
}
function exportJSON(){downloadFile("gpc_sauvegarde.json","application/json",JSON.stringify(DATA,null,2));}
function importJSON(){
  const input=document.createElement("input");input.type="file";input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{try{const nd=JSON.parse(ev.target.result);if(!nd.chantiers||!nd.depenses)throw new Error();DATA=nd;save();render();showToast("✓ Restauration réussie");}catch{alert("Fichier invalide.");}};
    reader.readAsText(file);
  };
  input.click();
}

  const allDepEUR=DATA.depenses.filter(d=>d.devise==="EUR").reduce((s,d)=>s+d.montant,0);

        <div class="tb"><div class="tl">Dépenses EUR</div><div class="tv amber">${fmtEUR(cTotalEUR)}</div></div>

function attachPageEvents(){
  if(pageAbortController)pageAbortController.abort();
  pageAbortController=new AbortController();
  const signal=pageAbortController.signal;
  const content=document.getElementById("content");

  document.getElementById("nav").addEventListener("click",e=>{
    const btn=e.target.closest("[data-tab]");if(btn)switchTab(btn.dataset.tab);
  },{signal});

  content.addEventListener("click",e=>{
    const ft=e.target.closest("[data-filter]");
    if(ft){depFilter=ft.dataset.filter;render();return;}
    const el=e.target.closest("[data-action]");if(el)handleAction(el);
  },{signal});

  content.addEventListener("input",e=>{
    if(e.target.id==="dep-search"){depSearch=e.target.value;render();}
  },{signal});

  content.addEventListener("change",e=>{
    if(e.target.id==="dep-sort"){depSort=e.target.value;render();}
  },{signal});
}

function attachModalEvents(modal){
  modal.addEventListener("click",e=>{
    const el=e.target.closest("[data-action]");if(el)handleAction(el);
  });
}

function handleAction(el){
  const action=el.dataset.action,id=el.dataset.id;
  if(action==="modal-close"){closeModal();return;}
  // CHANTIERS
  if(action==="chantier-detail"){modalChantierDetail(id);return;}
  if(action==="chantier-new"){modalChantierForm(null);return;}
  if(action==="chantier-edit"){closeModal();modalChantierForm(id);return;}
  if(action==="chantier-delete"){
    showConfirm("Supprimer ce chantier ?","Toutes les dépenses associées seront aussi supprimées.",()=>{
      const now=new Date().toISOString();
      DATA.depenses.filter(d=>d.chantierId===id).forEach(d=>{
        DATA.deletedIds.push({id:d.id, type:"depense", deletedAt:now});
      });
      DATA.deletedIds.push({id, type:"chantier", deletedAt:now});

      DATA.chantiers=DATA.chantiers.filter(c=>c.id!==id);
      DATA.depenses=DATA.depenses.filter(d=>d.chantierId!==id);
      save();closeAllModals();
    });return;
  
  }
  if(action==="chantier-toggle"){
    DATA.chantiers=DATA.chantiers.map(c=>c.id===id?{...c,status:c.status==="Payé"?"Non payé":"Payé"}:c);
    save();closeAllModals();modalChantierDetail(id);return;
  }
  if(action==="chantier-save"){
    const nom=document.getElementById("f-nom")?.value?.trim();
    if(!nom){document.getElementById("f-nom")?.focus();return;}
    const form={nom,jours:+document.getElementById("f-jours")?.value||0,type:document.getElementById("f-type")?.value,localisation:document.getElementById("f-loc")?.value||"",dateDebut:document.getElementById("f-date")?.value||"",tauxInterne:+document.getElementById("f-ti")?.value||DATA.parametres.tauxInterne,tauxExterne:+document.getElementById("f-te")?.value||DATA.parametres.tauxExterne,avanceDZD:+document.getElementById("f-avdzd")?.value||0,avanceEUR:+document.getElementById("f-aveur")?.value||0,notes:document.getElementById("f-notes")?.value||"",status:document.getElementById("f-status")?.value||"Non payé"};
    
    const now=new Date().toISOString();
    if(id){DATA.chantiers=DATA.chantiers.map(c=>c.id===id?{...c,...form,updatedAt:now}:c);}
    else{DATA.chantiers.push({id:uid(),...form,updatedAt:now});}
    save();closeAllModals();return;
  }
  // DEPENSES
  if(action==="dep-new"){modalDepForm(null,null);return;}
  if(action==="dep-new-for"){modalDepForm(el.dataset.chantierId,null);return;}
  if(action==="dep-justif"){const d=DATA.depenses.find(x=>x.id===id);if(d?.justificatif)showJustifModal(d.justificatif);return;}
  if(action==="dep-edit"){modalDepForm(null,id);return;}
  if(action==="dep-toggle"){
    DATA.depenses=DATA.depenses.map(d=>d.id===id?{...d,status:d.status==="Payé"?"Non Payé":"Payé"}:d);
    save();
    if(modalStack.length>0){const cid=DATA.depenses.find(d=>d.id===id)?.chantierId;if(cid){closeModal();modalChantierDetail(cid);}}else{render();}
    return;
  }
 if(action==="dep-delete"){
    showConfirm("Supprimer cette dépense ?","Cette action est irréversible.",()=>{
      const cid=DATA.depenses.find(d=>d.id===id)?.chantierId;
      DATA.deletedIds.push({id, type:"depense", deletedAt:new Date().toISOString()});
      DATA.depenses=DATA.depenses.filter(d=>d.id!==id);
      save();
      if(cid&&modalStack.length>0){closeModal();modalChantierDetail(cid);}else{closeAllModals();}
    });return;
  }
  if(action==="dep-save"){
    const montant=parseFloat(document.getElementById("f-montant")?.value);
    const devise=document.getElementById("f-devise")?.value||"DZD";
    const chantierId=el.dataset.chantierId||document.getElementById("f-chantier")?.value;
    const editId=el.dataset.editId||"";
    if(!montant||isNaN(montant)||!chantierId){if(!montant)document.getElementById("f-montant")?.focus();return;}
    const depData={chantierId,date:document.getElementById("f-date")?.value||new Date().toISOString().split("T")[0],categorie:document.getElementById("f-cat")?.value||getCats()[0],description:document.getElementById("f-desc")?.value||"",status:document.getElementById("f-status")?.value||"Non Payé"};
    const doSave=(finalMontant,finalDevise)=>{
      if(editId){
DATA.depenses=DATA.depenses.map(d=>d.id===editId?{...d,...depData,montant:finalMontant,devise:finalDevise,justificatif:currentJustifData??d.justificatif??null,updatedAt:new Date().toISOString()}:d);
      }else{
DATA.depenses.push({id:uid(),...depData,montant:finalMontant,devise:finalDevise,justificatif:currentJustifData||null,updatedAt:new Date().toISOString()});
      }
      save();
      currentJustifData = null;
      closeModal();
      if(chantierId&&modalStack.length>0){closeModal();modalChantierDetail(chantierId);}else{render();}
    };
    if(devise!=="EUR"&&DATA.parametres.taux[devise]){showConversionModal(montant,devise,doSave);}
    else{doSave(montant,devise);}
    return;
  }
  // PARAMÈTRES
  if(action==="params-save"){
    if(!DATA.parametres.profil)DATA.parametres.profil={};
    DATA.parametres.profil.nom=document.getElementById("p-nom")?.value||"";
    DATA.parametres.profil.prenom=document.getElementById("p-prenom")?.value||"";
    DATA.parametres.profil.matricule=document.getElementById("p-mat")?.value||"";
    DATA.parametres.profil.entreprise=document.getElementById("p-ent")?.value||"";
    DATA.parametres.tauxInterne=+document.getElementById("p-ti")?.value||130;
    DATA.parametres.tauxExterne=+document.getElementById("p-te")?.value||130;
    DATA.parametres.alerteJours=+document.getElementById("p-alerte")?.value||30;
    document.querySelectorAll(".p-taux").forEach(inp=>{const dev=inp.dataset.dev,dir=inp.dataset.dir;if(DATA.parametres.taux[dev])DATA.parametres.taux[dev][dir]=+inp.value;});
    save();return;
  }
  if(action==="cat-add"){
    const input=document.getElementById("new-cat");const val=input?.value?.trim();if(!val)return;
    if(!DATA.parametres.categories.includes(val)){DATA.parametres.categories.push(val);save();}
    if(input)input.value="";render();return;
  }
  if(action==="cat-delete"){
    const idx=parseInt(el.dataset.catIdx);
    if(!isNaN(idx)){DATA.parametres.categories.splice(idx,1);save();render();}return;
  }
  if(action==="sync-now"){syncNow(true);return;}
  if(action==="sync-test"){testSyncConnection();return;}
  if(action==="export-csv"){exportCSV();return;}
  if(action==="export-json"){exportJSON();return;}
  if(action==="import-json"){importJSON();return;}
  if(action==="export-pdf-global"){exportPDF(null);return;}
  if(action==="export-pdf-chantier"){exportPDF(id);return;}
}

function getSyncIP(){return(DATA.sync?.serverIP||"").trim();}

function setSyncStatus(state,label){
  const btn=document.getElementById("sync-header-btn");
  const ico=document.getElementById("sync-icon");
  const lbl=document.getElementById("sync-label");
  if(!btn)return;
  btn.className="sync-btn sync-"+state;
  if(ico)ico.innerHTML=state==="loading"?`<span class="sync-spin">⟳</span>`:(state==="ok"?"✓":"⇄");
  if(lbl)lbl.textContent=label||"Sync";
  if(state==="ok"||state==="err"){setTimeout(()=>setSyncStatus("idle","Sync"),4000);}
}

// ─── Barre de progression images ─────────────────────────────────────────────
function showImageProgress(current, total, chantierNom){
  let overlay = document.getElementById("img-progress-overlay");
  if(!overlay){
    overlay = document.createElement("div");
    overlay.id = "img-progress-overlay";
    overlay.className = "img-progress-overlay";
    overlay.innerHTML = `<div class="img-progress-box">
      <div class="img-progress-title">📤 Transfert des justificatifs</div>
      <div class="img-progress-sub" id="img-progress-sub"></div>
      <div class="img-progress-bar-bg"><div class="img-progress-bar-fill" id="img-progress-fill" style="width:0%"></div></div>
      <div class="img-progress-count" id="img-progress-count"></div>
    </div>`;
    document.getElementById("app").appendChild(overlay);
  }
  const pct = total > 0 ? Math.round((current/total)*100) : 0;
  document.getElementById("img-progress-sub").textContent = chantierNom || "";
  document.getElementById("img-progress-fill").style.width = pct + "%";
  document.getElementById("img-progress-count").textContent = `${current} / ${total} images`;
}
function hideImageProgress(){
  const overlay = document.getElementById("img-progress-overlay");
  if(overlay) overlay.remove();
}

// ─── Upload images vers PC ────────────────────────────────────────────────────
async function uploadImages(ip){
 const depsWithImages = DATA.depenses.filter(
  d => d.justificatif 
       && d.justificatif.startsWith("data:")
       && !d.justifSynced
);
  if(depsWithImages.length === 0) return { uploaded: 0, errors: 0 };

  let uploaded = 0, errors = 0;
  showImageProgress(0, depsWithImages.length, "Préparation...");

  for(let i = 0; i < depsWithImages.length; i++){
    const dep = depsWithImages[i];
    const chantier = DATA.chantiers.find(c => c.id === dep.chantierId);
    const chantierNom = chantier?.nom || "Sans chantier";
    showImageProgress(i, depsWithImages.length, `${chantierNom} — ${dep.description||dep.id}`);
    try{
      const res = await fetch(`${ip}/upload-image`, {
        method: "POST",
        headers: {"Content-Type":"application/json","ngrok-skip-browser-warning":"true"},
        body: JSON.stringify({
          depenseId: dep.id,
          chantierNom: chantierNom,
          imageData: dep.justificatif
        }),
        signal: AbortSignal.timeout(30000)
      });

    if(res.ok){
  const json = await res.json();
  uploaded++;

  DATA.depenses = DATA.depenses.map(d =>
    d.id === dep.id
      ? {
          ...d,
          justifSynced: true,
          justifServerPath: json.path // <-- chemin serveur sauvegardé
        }
      : d
  );
}
       else { errors++; }
    } catch(e){ errors++; }
    showImageProgress(i+1, depsWithImages.length, `${chantierNom} — ${dep.description||dep.id}`);
  }
  hideImageProgress();
  return { uploaded, errors };
}

async function syncNow(fromSettings){
  const ip=getSyncIP();
  if(!ip){
    const r=fromSettings?document.getElementById("sync-result-full"):null;
    if(r)r.innerHTML=`<div style="color:var(--red);font-size:12px;padding:8px 0">⚠️ Entrez d'abord l'adresse IP du serveur.</div>`;
    else showToast("⚠️ Configurez l'IP dans Paramètres");
    return;
  }
  setSyncStatus("loading","Synchro...");
  const resultEl=fromSettings?document.getElementById("sync-result-full"):null;
  if(resultEl)resultEl.innerHTML=`<div style="color:var(--text3);font-size:12px;padding:8px 0">⟳ Connexion en cours...</div>`;
  try{
    // ── ÉTAPE 1 : Sync des données (sans images) ──
    const dataToSend={
      ...DATA,
      chantiers:DATA.chantiers.map(c=>({...c,updatedAt:c.updatedAt||'2000-01-01T00:00:00.000Z'})),
      depenses:DATA.depenses.map(d=>({...d,updatedAt:d.updatedAt||'2000-01-01T00:00:00.000Z',justificatif:null})),
      deletedIds:DATA.deletedIds||[],
    };
    const res=await fetch(`${ip}/sync`,{method:"POST",headers:{"Content-Type":"application/json","ngrok-skip-browser-warning":"true"},body:JSON.stringify(dataToSend),signal:AbortSignal.timeout(30000)});
    if(!res.ok)throw new Error(`Serveur: ${res.status}`);
    const result=await res.json();
    if(!result.ok)throw new Error(result.error||"Erreur inconnue");

    // Sauvegarder les images locales avant d'écraser
const imagesLocales = {};
DATA.depenses.forEach(d => {
  if(d.justificatif) imagesLocales[d.id] = d.justificatif;
});

DATA.chantiers=result.merged.chantiers||DATA.chantiers;
DATA.depenses=(result.merged.depenses||DATA.depenses).map(d => ({
  ...d,
  justificatif: imagesLocales[d.id] || d.justificatif || null
}));
    if(result.merged.parametres)DATA.parametres=result.merged.parametres;
    DATA.deletedIds=result.merged.deletedIds||DATA.deletedIds||[];
    if(!DATA.sync)DATA.sync={};
    DATA.sync.lastSync=new Date().toISOString();
    DATA.sync.serverIP=ip;
    save();
    const s=result.stats||{};

    // ── ÉTAPE 2 : Upload des images justificatifs ──
    const imgResult = await uploadImages(ip);

    setSyncStatus("ok","Synchronisé ✓");
    const imgInfo = imgResult.uploaded > 0 ? ` · 📷 ${imgResult.uploaded} image${imgResult.uploaded>1?"s":""}` : "";
    showToast(`✓ ${s.totalChantiers||0} chantiers · ${s.totalDepenses||0} dépenses${imgInfo}`);
    if(resultEl){
      resultEl.innerHTML=`<div style="background:rgba(6,78,59,.2);border:1px solid rgba(16,185,129,.3);border-radius:10px;padding:12px;margin-top:8px">
        <div style="font-weight:700;color:var(--green);margin-bottom:6px">✅ Synchronisation réussie</div>
        <div style="font-size:12px;color:var(--text2)">${s.totalChantiers} chantiers · ${s.totalDepenses} dépenses</div>
        ${imgResult.uploaded>0?`<div style="font-size:12px;color:var(--amber);margin-top:4px">📷 ${imgResult.uploaded} image${imgResult.uploaded>1?"s":""} transférée${imgResult.uploaded>1?"s":""} vers le PC</div>`:""}
        ${imgResult.errors>0?`<div style="font-size:11px;color:var(--red);margin-top:2px">⚠️ ${imgResult.errors} image${imgResult.errors>1?"s":""} échouée${imgResult.errors>1?"s":""}</div>`:""}
        <div style="font-size:11px;color:var(--text3);margin-top:4px">${new Date().toLocaleString("fr-FR")}</div>
      </div>`;
    }
    render();
  }catch(e){
    hideImageProgress();
    const errMsg=e.name==="TimeoutError"?"Délai dépassé — PC injoignable":e.message;
    setSyncStatus("err","Échec");
    showToast("❌ "+errMsg);
    if(resultEl){resultEl.innerHTML=`<div style="background:rgba(127,29,29,.2);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px;margin-top:8px"><div style="font-weight:700;color:var(--red);margin-bottom:6px">❌ Connexion échouée</div><div style="font-size:12px;color:var(--text2)">${errMsg}</div><div style="font-size:11px;color:var(--text3);margin-top:6px">• LANCER_SERVEUR.bat ouvert sur PC ?<br>• Même WiFi ?<br>• IP correcte ?</div></div>`;}
  }
}

async function testSyncConnection(){
  const input = document.getElementById("p-syncip");
  let ip = input?.value?.trim();
  const result = document.getElementById("sync-test-result");
  
  if(!ip || !result) return;
  
  // Force le format correct si oublié
  if(!ip.startsWith('http')) ip = 'http://' + ip;

  result.innerHTML = `<span style="color:var(--text3)">⟳ Test en cours...</span>`;
  
  try {
    const res = await fetch(`${ip}/ping`, { 
    method: 'GET',
    cache: 'no-store',
    headers: {"ngrok-skip-browser-warning":"true"}

    });

    if (!res.ok) throw new Error(`Erreur HTTP: ${res.status}`);

    const data = await res.json(); // C'est ici que l'erreur "token" arrivait
    
    if(data && data.ok) {
      result.innerHTML = `<span style="color:var(--green)">✓ Serveur détecté ! (Heure PC : ${new Date(data.time).toLocaleTimeString()})</span>`;
      // Sauvegarde l'IP pour que le bouton Sync du haut l'utilise
      if(!DATA.sync) DATA.sync = {};
      DATA.sync.serverIP = ip;
      save(); 
    }
  } catch(e) {
    console.error("Détail erreur test:", e);
    result.innerHTML = `<span style="color:var(--red)">❌ Erreur : ${e.message}</span>`;
  }
}

render();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").then(reg=>{
    setInterval(()=>reg.update(),60000);
    reg.addEventListener("updatefound",()=>{
      const newSW=reg.installing;
      newSW.addEventListener("statechange",()=>{
        if(newSW.state==="installed"&&navigator.serviceWorker.controller)showUpdateBanner();
      });
    });
  }).catch(()=>{});
 // APRÈS
let refreshing=false;
navigator.serviceWorker.addEventListener("controllerchange",()=>{
  if(!refreshing){
    refreshing=true;
    // Ne recharge que si aucun modal ouvert (pas de saisie en cours)
    if(modalStack.length===0){
      window.location.reload();
    } else {
      showToast("🔄 Mise à jour prête — ferme le formulaire pour l'appliquer");
    }
  }
});
}
function showUpdateBanner(){
  if(document.getElementById("update-banner"))return;
  const banner=document.createElement("div");
  banner.id="update-banner";
  banner.style.cssText="position:fixed;top:0;left:0;right:0;z-index:999;background:#f59e0b;color:#09090b;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;font-family:var(--font-body);font-size:13px;font-weight:600;max-width:430px;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,.3);";
  banner.innerHTML=`<span>🔄 Nouvelle version disponible</span><button onclick="applyUpdate()" style="background:#09090b;color:#f59e0b;border:none;border-radius:8px;padding:6px 14px;font-weight:700;cursor:pointer;font-size:12px">Mettre à jour</button>`;
  document.getElementById("app").prepend(banner);
}
function applyUpdate(){if(navigator.serviceWorker.controller)navigator.serviceWorker.controller.postMessage("SKIP_WAITING");}

// MODAL JUSTIFICATIF
// ═══════════════════════════════════════════════════════
function showJustifModal(src){
  const div=document.createElement("div");
  div.style.cssText="position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:430px;margin:0 auto;";
  div.innerHTML=`
    <div style="position:relative;width:100%;height:100%;display:flex;flex-direction:column;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;flex-shrink:0;">
        <span style="font-size:13px;color:#a1a1aa;">Justificatif</span>
        <button id="jm-close" style="background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:50%;width:34px;height:34px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>
      <div id="jm-wrap" style="flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:16px;">
        <img id="jm-img" src="${src}" style="max-width:100%;max-height:100%;border-radius:12px;transition:transform .2s;transform-origin:center;user-select:none;" draggable="false"/>
      </div>
      <div style="display:flex;gap:10px;padding:12px 16px;flex-shrink:0;">
        <button id="jm-zoom-in"  style="flex:1;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:10px;padding:10px;font-size:20px;cursor:pointer;">＋</button>
        <button id="jm-zoom-out" style="flex:1;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:10px;padding:10px;font-size:20px;cursor:pointer;">－</button>
        <button id="jm-reset"    style="flex:1;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:10px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;">Reset</button>
      </div>
    </div>`;
  document.getElementById("app").appendChild(div);
  let scale=1;
  const img=div.querySelector("#jm-img");
  const setScale=v=>{scale=Math.min(4,Math.max(1,v));img.style.transform=`scale(${scale})`;};
  div.querySelector("#jm-zoom-in").onclick=()=>setScale(scale+0.5);
  div.querySelector("#jm-zoom-out").onclick=()=>setScale(scale-0.5);
  div.querySelector("#jm-reset").onclick=()=>setScale(1);
  div.querySelector("#jm-close").onclick=()=>div.remove();
  div.onclick=e=>{if(e.target===div)div.remove();};
}

// ═══════════════════════════════════════════════════════
// JUSTIFICATIFS
// ═══════════════════════════════════════════════════════
let currentJustifData = null;

function previewJustif(input) {
  const file = input.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1200;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      currentJustifData = canvas.toDataURL("image/jpeg", 0.75);
      const preview = document.getElementById("justif-preview");
      const wrap = document.getElementById("justif-preview-wrap");
      if (preview) preview.src = currentJustifData;
      if (wrap) wrap.style.display = "";
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function clearJustif() {
  currentJustifData = null;
  const preview = document.getElementById("justif-preview");
  const wrap = document.getElementById("justif-preview-wrap");
  if (preview) preview.src = "";
  if (wrap) wrap.style.display = "none";
  const f1 = document.getElementById("f-justif");
  const f2 = document.getElementById("f-justif-gallery");
  if (f1) f1.value = "";
  if (f2) f2.value = "";
}
